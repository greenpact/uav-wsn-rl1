repeat = 3

[General]
network = src.UavWsnNetwork
sim-time-limit = 5000s

# Ensure the `src` package is on the NED path so package-qualified names resolve
ned-path = .:src

# Multi-run configuration with different seeds
#repeat = 30
#seed-set = ${repetition}

# Network Topology - 100-node benchmark
*.numNodes = 400
*.areaX = 1000
*.areaY = 1000

# Sensor Node Energy Model (First-Order Radio Model) - apply to sensors[]
**.sensors[*].initialEnergy = 0.5
# force frequent beacons for transition collection
**.sensors[*].beaconInterval = 0.1

# Data generation interval for sensors (seconds)
**.sensors[*].dataInterval = 1.0

**.sensors[*].controlPacketSize = 200
**.sensors[*].dataPacketSize = 2000
**.sensors[*].eElec = 50e-9
**.sensors[*].eFreeSpace = 10e-12
**.sensors[*].eMultiPath = 0.0013e-12
**.sensors[*].idleListeningPower = 1.84e-5
#**.sensors[*].chDutyCycle = 0.3
#**.sensors[*].memberDutyCycle = 0.02
#**.sensors[*].isolatedDutyCycle = 0.001
**.sensors[*].commRadius = 100

# Base Station Location
*.bs.commRadius = 250
*.bs.xPos = -200
*.bs.yPos = 500

# UAV Parameters
*.uav.uavHeight = 30
*.uav.minSpeed = 10
*.uav.maxSpeed = 10
#*.uav.searchSpeed = 10
#*.uav.discoveryInterval = 5.0
*.uav.commRadius = 192
*.radioMedium.roundDuration = 1.0
**.routing[*].modelFile = "/home/wte/uavwsn-rl/rl-1/uav-wsn-rl1/models/exp_model_0.mdl"
**.routing[*].transitionsFile = "results/transitions.jsonl"
#*.uav.dataRate = 2000000
#*.uav.handshakeDelay = 0.05
#*.uav.roundDuration = 774
#*.uav.collectionWindow = 691

# Simulation Recording
**.scalar-recording = true
**.vector-recording = false

# Output configuration for each repetition
output-scalar-file = ${resultdir}/${configname}-${runnumber}.sca
output-vector-file = ${resultdir}/${configname}-${runnumber}.vec
result-dir = results/multi-run/run-${repetition}

[Config QuickTest]
network = src.UavWsnNetwork
sim-time-limit = 2s
*.numNodes = 2
result-dir = results/quick-test
