repeat = 1

[General]
network = src.UavWsnNetwork
sim-time-limit = 5000s

# Ensure the `src` package is on the NED path so package-qualified names resolve
ned-path = .:src

# Multi-run configuration with different seeds
seed-set = ${repetition}

# Network topology
*.numNodes = 400
*.areaX = 1000
*.areaY = 1000
*.radioMedium.roundDuration = 1.0

# Sensor nodes
**.sensors[*].initialEnergy = 0.5
**.sensors[*].beaconInterval = 0.1
**.sensors[*].dataInterval = 1.0
**.sensors[*].controlPacketSize = 200
**.sensors[*].dataPacketSize = 2000
**.sensors[*].eElec = 50e-9
**.sensors[*].eFreeSpace = 10e-12
**.sensors[*].eMultiPath = 0.0013e-12
**.sensors[*].idleListeningPower = 1.84e-5
**.sensors[*].range154 = 100
**.sensors[*].enableBeaconing = true
**.sensors[*].enableDataGeneration = true
**.sensors[*].isBaseStation = false

# Base station
*.bs.initialX = -200
*.bs.initialY = 500
*.bs.enableBeaconing = false
*.bs.enableDataGeneration = false
*.bs.isBaseStation = true

# UAV Parameters
*.uav.minSpeed = 10
*.uav.maxSpeed = 10
*.uav.commRadius = 192
*.uav.uploadRadius = 280
*.uav.beaconInterval = 5.0
*.uav.positionUpdateInterval = 0.5
*.uav.uploadInterval = 0.5
*.uav.missionPeriod = 280
*.uav.missionDuration = -1
*.uav.contactWindow = 8.0

# TR-LAR routing
**.routing[*].modelFile = ""
**.routing[*].transitionsFile = "results/transitions.jsonl"
**.routing[*].bufferSize = 32
**.routing[*].maxCandidates = 5
**.routing[*].maxRetries = 1
**.routing[*].maxRouteAttempts = 6
**.routing[*].maxHops = 30
**.routing[*].minLinkQuality = 0.25
**.routing[*].minNeighborEnergyRatio = 0.05
**.routing[*].adaptationAlpha = 0.2
**.routing[*].queueHighWatermark = 0.8
**.routing[*].congestionPenalty = 0.15
**.routing[*].delayThreshold = 0.25
**.routing[*].ackTimeout = 0.6
**.routing[*].neighborTimeout = 5.0
**.routing[*].decisionInterval = 0.02

# Simulation Recording
**.scalar-recording = true
**.vector-recording = false

# Output configuration for each repetition
output-scalar-file = ${resultdir}/${configname}-${runnumber}.sca
output-vector-file = ${resultdir}/${configname}-${runnumber}.vec
result-dir = results/multi-run/run-${repetition}

[Config QuickTest]
network = src.UavWsnNetwork
sim-time-limit = 2s
*.numNodes = 2
result-dir = results/quick-test

[Config OfflineDqnPolicy]
extends = General
**.routing[*].modelFile = "models/offline_qtable.qtab"
result-dir = results/offline-dqn-policy

[Config OfflineDqnMlp]
extends = General
**.routing[*].modelFile = "models/offline_dqn_policy.mdl"
result-dir = results/offline-dqn-mlp
