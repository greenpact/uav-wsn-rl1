[General]
network = src.UAVWSN_RL1
sim-time-limit = 10s

# New standalone (no-INET) configuration
ned-path = .:src

# Network sizing
src.UAVWSN_RL1.numSensors = 400

# Radio ranges (meters)
**.sensors[*].range = 100
**.uav.range = 150

# Area size for convenience
src.UAVWSN_RL1.areaX = 1000
src.UAVWSN_RL1.areaY = 1000

# Output files
output-scalar-file = results.sca
output-vector-file = results.vec
record-eventlog = true

# No INET libraries loaded
load-libs = out/clang-release/libMakefile.so


# Base station and UAV start at the base station location (-200,500)
