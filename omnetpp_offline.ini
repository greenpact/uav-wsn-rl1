repeat = 30

[General]
network = src.UavWsnNetwork
sim-time-limit = 5000s
ned-path = .:src
seed-set = ${repetition}

*.numNodes = 400
*.areaX = 1000
*.areaY = 1000
*.radioMedium.roundDuration = 1.0

**.sensors[*].initialEnergy = 0.5
**.sensors[*].beaconInterval = 0.1
**.sensors[*].dataInterval = 1.0
**.sensors[*].controlPacketSize = 200
**.sensors[*].dataPacketSize = 2000
**.sensors[*].eElec = 50e-9
**.sensors[*].eFreeSpace = 10e-12
**.sensors[*].eMultiPath = 0.0013e-12
**.sensors[*].idleListeningPower = 1.84e-5
**.sensors[*].range154 = 100
**.sensors[*].enableBeaconing = true
**.sensors[*].enableDataGeneration = true
**.sensors[*].isBaseStation = false

*.bs.initialX = -200
*.bs.initialY = 500
*.bs.enableBeaconing = false
*.bs.enableDataGeneration = false
*.bs.isBaseStation = true

*.uav.minSpeed = 10
*.uav.maxSpeed = 10
*.uav.commRadius = 192
*.uav.uploadRadius = 280
*.uav.beaconInterval = 5.0
*.uav.positionUpdateInterval = 0.5
*.uav.uploadInterval = 0.5
*.uav.missionPeriod = 280
*.uav.missionDuration = -1
*.uav.contactWindow = 8.0

**.routing[*].modelFile = ""
**.routing[*].bufferSize = 32
**.routing[*].maxCandidates = 5
**.routing[*].maxRetries = 1
**.routing[*].maxRouteAttempts = 6
**.routing[*].maxHops = 30
**.routing[*].minLinkQuality = 0.25
**.routing[*].minNeighborEnergyRatio = 0.05
**.routing[*].adaptationAlpha = 0.2
**.routing[*].queueHighWatermark = 0.8
**.routing[*].congestionPenalty = 0.15
**.routing[*].delayThreshold = 0.25
**.routing[*].ackTimeout = 0.6
**.routing[*].neighborTimeout = 5.0
**.routing[*].decisionInterval = 0.02

# Heterogeneous per-episode behavior policy schedule
**.routing[*].policyPool = "eps_0.05,eps_0.10,eps_0.20,eps_0.25,softmax_0.2,softmax_0.5,softmax_1.0,greedy"
**.routing[*].policyMixWeights = "1.0,1.0,1.0,2.0,1.0,1.0,1.0,0.6"
**.routing[*].episodePolicyMode = "random_stratified"
**.routing[*].episodeDuration = 280.0

# Fixed utility coefficients for reproducibility
**.routing[*].utilityCoeffLq = 1.7
**.routing[*].utilityCoeffNeighEnergy = 0.9
**.routing[*].utilityCoeffQueue = 1.1
**.routing[*].utilityCoeffFail = 1.0
**.routing[*].utilityCoeffUavDistance = 0.35
**.routing[*].mobilityTag = "ggm-base"

**.scalar-recording = true
**.vector-recording = false

output-scalar-file = ${resultdir}/${configname}-${runnumber}.sca
output-vector-file = ${resultdir}/${configname}-${runnumber}.vec

[Config OfflineData_BehaviorUtility]
extends = General
**.routing[*].policyPool = "eps_0.05,eps_0.10,eps_0.20,eps_0.25,greedy"
**.routing[*].policyMixWeights = "1.2,1.2,1.0,2.0,0.8"
result-dir = results/offline_dataset/behavior-utility/run-${repetition}
**.routing[*].transitionsFile = "results/offline_dataset/behavior-utility/run-${repetition}/transitions.jsonl"

[Config OfflineData_BehaviorStochastic]
extends = General
**.routing[*].policyPool = "eps_0.10,eps_0.25,softmax_0.2,softmax_0.5,softmax_1.0"
**.routing[*].policyMixWeights = "1.0,2.0,1.0,1.0,1.0"
result-dir = results/offline_dataset/behavior-stochastic/run-${repetition}
**.routing[*].transitionsFile = "results/offline_dataset/behavior-stochastic/run-${repetition}/transitions.jsonl"

[Config OfflineData_AblationNoUav]
extends = General
**.routing[*].utilityCoeffUavDistance = 0.0
**.routing[*].policyPool = "eps_0.10,eps_0.25,greedy"
**.routing[*].policyMixWeights = "1.0,2.0,1.0"
result-dir = results/offline_dataset/ablation-no-uav/run-${repetition}
**.routing[*].transitionsFile = "results/offline_dataset/ablation-no-uav/run-${repetition}/transitions.jsonl"

[Config Eval_OfflineQTable]
extends = General
**.routing[*].modelFile = "models/offline_qtable.qtab"
result-dir = results/offline_eval/qtable/run-${repetition}
**.routing[*].transitionsFile = "results/offline_eval/qtable/run-${repetition}/transitions.jsonl"

[Config Eval_OfflineMlp]
extends = General
**.routing[*].modelFile = "models/offline_dqn_policy.mdl"
result-dir = results/offline_eval/mlp/run-${repetition}
**.routing[*].transitionsFile = "results/offline_eval/mlp/run-${repetition}/transitions.jsonl"
